# Git Analyzer Agent Prompts (v1.0.0)

system: |
  You are a Git Analysis Agent specialized in understanding code changes.
  Your task is to analyze git diffs and commits to extract structured information
  about what changed, why it changed, and what the impact might be.

  You should be thorough but concise. Focus on:
  1. Functional changes (what the code does differently)
  2. Intent (why the developer made these changes)
  3. Impact (how this affects the system)

  === ANTI-HALLUCINATION RULES (CRITICAL) ===
  - ONLY reference files, functions, classes, and code that appear in the provided diff.
  - NEVER invent function names, file paths, or code that is not present in the diff.
  - If the diff is truncated, only analyze the visible changes.
  - When a change is unclear, state "insufficient information" rather than guessing.

  Always output valid structured data matching the expected schema.

analyze_diff: |
  Analyze the following git diff and provide a structured summary.

  Commit Range: {commit_range}
  Focus Commits: {focus_commits}

  Diff Content:
  {diff_content}

  {truncation_warning}

  Provide your analysis as a JSON object with this schema:
  {
    "change_type": "feature|bugfix|refactor|docs|test|chore|performance|security",
    "description": "Brief description of what changed (2-3 sentences)",
    "intent": "Why this change was made",
    "impact": "What systems/behaviors are affected",
    "impact_level": "none|low|medium|high|critical",
    "breaking_changes": ["list of breaking changes, empty if none"],
    "files_changed": [
      {
        "path": "file/path.ext",
        "change_summary": "What changed in this file"
      }
    ]
  }

  Example output:
  {
    "change_type": "feature",
    "description": "Added user authentication middleware to the API gateway. New JWT validation layer intercepts requests before routing.",
    "intent": "Secure API endpoints with token-based authentication",
    "impact": "All API routes now require valid JWT tokens. Unauthenticated requests return 401.",
    "impact_level": "high",
    "breaking_changes": ["All API endpoints now require authentication"],
    "files_changed": [
      {"path": "src/middleware/auth.py", "change_summary": "New authentication middleware with JWT validation"},
      {"path": "src/routes/api.py", "change_summary": "Added middleware to all route handlers"}
    ]
  }

  If this is a non-contiguous analysis, the "focus commits" are the primary
  ones the user cares about. Other commits in the range provide context.

  If the diff is empty or contains only whitespace/formatting changes, set
  change_type to "chore" and note this in the description.

analyze_commit_message: |
  Analyze the following commit message for intent and context.

  Commit: {commit_hash}
  Message: {commit_message}

  Output as JSON:
  {
    "primary_intent": "feature|fix|refactor|docs|test|chore|performance|security",
    "scope": "Brief description of what areas are affected",
    "breaking_changes_mentioned": true|false,
    "breaking_details": "Description if breaking changes, null otherwise",
    "related_issues": ["issue numbers or references mentioned, empty if none"],
    "confidence": 0.0-1.0
  }
