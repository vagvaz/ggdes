model:
  provider: "ollama"
  # model_name: "qwen3-coder-next"
  model_name: "qwen3.6"
  # model_name: lfm2.5-thinking
  api_key: "ollama"
  base_url: "http://192.168.0.179:11234/v1"
  enable_thinking: false

paths:
  knowledge_base: ".ggdes-local/kb"
  worktrees: ".ggdes-local/worktrees"

output:
  default_format: "markdown"
  formats: ["markdown"]

features:
  semantic_diff: false
  auto_cleanup: true
  worktree_retention_days: 7

analysis:
  enable_chunked_diff: true
  chunk_mode: independent        # independent (fast) or accumulated (slower, more coherent)
  chunk_token_threshold: 1000
  max_diff_tokens: 50000
